<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anaguma member BINGO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMLを画像に変換するためのライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-width: 600px;
            width: 100%;
        }
        .bingo-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: #18181b;
            border: 1px solid #27272a;
            word-break: break-all;
            overflow: hidden;
        }
        @media (min-width: 640px) {
            .bingo-cell { font-size: 0.9rem; padding: 8px; }
            .bingo-grid { gap: 12px; }
        }
        .bingo-cell:hover {
            border-color: #3b82f6;
            background: #27272a;
        }
        .bingo-cell.marked {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            transform: scale(0.95);
        }
        .bingo-cell.free {
            background: #3f3f46;
            color: #fbbf24;
            border-color: #fbbf24;
        }
        .bingo-cell.free.marked {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
        }
        .bingo-animation {
            animation: celebrate 0.5s ease-out infinite alternate;
        }
        @keyframes celebrate {
            from { transform: scale(1); text-shadow: 0 0 10px #3b82f6; }
            to { transform: scale(1.1); text-shadow: 0 0 25px #8b5cf6, 0 0 40px #3b82f6; }
        }
        .capture-area {
            padding: 20px;
            background-color: #000;
            border-radius: 24px;
        }
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80px;
        }
        .logo-container img {
            max-width: 160px;
            height: auto;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
            display: block;
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 md:p-8">

    <header class="mb-8 text-center flex flex-col items-center">
        <div class="logo-container mb-4">
            <!-- 外部画像リンクを使用するか、ファイルを同梱してください -->
            <!-- ここではプレースホルダーとしてIMGタグを残しますが、GitHubに画像を上げる場合はパスを合わせます -->
            <img id="main-logo" src="Anagumalabo_logo.png" alt="Anaguma Labo Logo" crossorigin="anonymous">
        </div>
        <h1 class="text-3xl md:text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2 uppercase italic">
            Anaguma member BINGO
        </h1>
        <p class="text-zinc-500 text-sm">会ったことのあるメンバーをクリック！ 揃ったらビンゴ！</p>
    </header>

    <div id="capture-target" class="capture-area relative mb-8">
        <div class="relative bg-zinc-900/50 p-4 md:p-8 rounded-3xl border border-zinc-800 shadow-2xl">
            <div id="bingo-board" class="bingo-grid"></div>

            <div id="bingo-overlay" class="hidden absolute inset-0 flex items-center justify-center bg-black/80 backdrop-blur-md rounded-3xl z-10 text-center">
                <div id="overlay-content">
                    <h2 class="text-6xl md:text-7xl font-black text-white italic mb-8 uppercase bingo-animation">BINGO!!</h2>
                    <button onclick="closeOverlay()" class="px-12 py-3 bg-white text-black font-bold rounded-full hover:bg-zinc-200 transition-all transform hover:scale-105 active:scale-95 shadow-xl">OK</button>
                </div>
            </div>
        </div>
        <div class="text-center mt-4 text-zinc-600 text-[10px] uppercase tracking-widest opacity-50">
            Anaguma Community Bingo Tool
        </div>
    </div>

    <div class="flex flex-col items-center gap-6">
        <div id="bingo-counter" class="text-blue-400 font-bold bg-blue-900/20 px-6 py-2 rounded-full border border-blue-800/50 text-lg">
            Bingo Count: 0
        </div>
        
        <div class="flex flex-wrap justify-center gap-4">
            <button id="save-btn" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition-all flex items-center gap-2 shadow-lg shadow-blue-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                画像として保存
            </button>

            <button id="regenerate-btn" class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 text-white font-bold rounded-xl transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
                カードを再生成
            </button>
        </div>
    </div>

    <footer class="mt-12 text-zinc-600 text-xs text-center pb-8">
        &copy; Anaguma Community Bingo Tool
    </footer>

    <script>
        const logoImg = document.getElementById('main-logo');
        logoImg.onerror = function() {
            this.style.display = 'none';
            console.log("Logo file not found. Please ensure 'Anagumalabo_logo.png' is in the same directory.");
        };

        const memberNames = [
            "さきこ", "kimkim", "アフロマンス", "ゆず", "misa", "あさみ", "ももこ", "たかなり", "トヨマネ", "わいちゃん",
            "くるみ", "Eddy", "moya", "だいちゃん", "しゅっぺ", "永田", "トミー", "けにー", "ゆり", "かほ",
            "Takaaya", "あやか", "きんちゃん", "こい", "ありな", "とも", "りり", "omiki", "Jun Inaba", "タカヒロ",
            "ひかり", "ひろき", "しの", "にーやん", "あいめろ", "ゆきや／チベ", "しん", "ノナカ", "yas-o", "まっとも",
            "コジ", "りみ", "たびろち", "ユート", "あかりん", "じょう", "もりや", "おーしま", "スイタ氏", "えりんご",
            "あせどん", "やぶ", "ルーク", "ニック", "よねじ", "いつか", "ミハラ", "まあさ", "あやせ", "くの",
            "Suzume", "くりぴ〜", "ゆい", "アラレ", "まゆ", "さき", "5歳", "ぴろ", "つっくん", "じょ",
            "白鳥るな", "りょうちゃん", "アイ", "おいちゃん", "ももな", "ささき", "アトム", "yoshi", "ナホ", "いちろー",
            "西田 真魚", "ダイスケ", "ミヤ", "HERO", "パクチー長瀬", "たぐち", "まっしー", "あや", "くら", "さいさい",
            "せつこ", "ハマー", "なお", "じゅんや", "よしよし", "フルッター", "ユウ", "しらさか", "いじゅ", "叶ここ",
            "川崎塾", "あさくら", "ちあき", "ちょう", "さらにあん", "みどり", "しもりん", "おかっち", "おしげ", "かずーちゃ",
            "ねじ", "との", "せん", "まお", "ゆーじ", "ジロー", "ぽん(こやま)", "なかやま", "マッチ", "ほのか",
            "えいじ", "のぞみ", "みょっこ", "よーすけ", "mika", "シュウヘイ", "しゅうすけ", "マサト", "米光一成", "よね",
            "マウイ", "ayumi", "みやかな", "柚井ゆい", "じゅん", "あっぴ", "ふじ", "ベロタン", "あつみん", "ごう",
            "はしもと", "こうは", "ゆうこ", "ちかさん", "青鳥の如き尊きもの（アオドリ）"
        ];

        let boardData = [];
        let completedBingos = 0; 

        function initGame() {
            const board = document.getElementById('bingo-board');
            board.innerHTML = '';
            boardData = [];
            completedBingos = 0;
            updateCounter();
            
            const shuffled = [...memberNames].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 24);
            
            let nameIndex = 0;
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'bingo-cell';
                if (i === 12) {
                    cell.textContent = 'FREE';
                    cell.classList.add('free', 'marked');
                    boardData.push({ id: i, name: 'FREE', marked: true });
                } else {
                    const name = selected[nameIndex++];
                    cell.textContent = name;
                    cell.addEventListener('click', () => toggleMark(i, cell));
                    boardData.push({ id: i, name: name, marked: false });
                }
                board.appendChild(cell);
            }
        }

        function toggleMark(index, element) {
            boardData[index].marked = !boardData[index].marked;
            element.classList.toggle('marked', boardData[index].marked);
            checkBingo();
        }

        function updateCounter() {
            document.getElementById('bingo-counter').textContent = `Bingo Count: ${completedBingos}`;
        }

        function checkBingo() {
            const size = 5;
            let count = 0;
            // Rows
            for (let i = 0; i < size; i++) if (boardData.slice(i*5, i*5+5).every(d => d.marked)) count++;
            // Cols
            for (let i = 0; i < size; i++) {
                let col = [];
                for (let j = 0; j < size; j++) col.push(boardData[i + j*5]);
                if (col.every(d => d.marked)) count++;
            }
            // Diagonals
            let d1 = [], d2 = [];
            for (let i = 0; i < size; i++) {
                d1.push(boardData[i * 6]);
                d2.push(boardData[(i + 1) * 4]);
            }
            if (d1.every(d => d.marked)) count++;
            if (d2.every(d => d.marked)) count++;

            if (count > completedBingos) {
                completedBingos = count;
                updateCounter();
                showOverlay();
            } else {
                completedBingos = count;
                updateCounter();
            }
        }

        function showOverlay() { document.getElementById('bingo-overlay').classList.remove('hidden'); }
        function closeOverlay() { document.getElementById('bingo-overlay').classList.add('hidden'); }

        async function saveAsImage() {
            const target = document.getElementById('capture-target');
            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerText = "保存中...";
            try {
                const canvas = await html2canvas(target, {
                    backgroundColor: '#000',
                    scale: 2,
                    useCORS: true,
                    allowTaint: true
                });
                const link = document.createElement('a');
                link.download = `AnagumaBingo_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                console.error(err);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>画像として保存`;
            }
        }

        document.getElementById('save-btn').addEventListener('click', saveAsImage);
        document.getElementById('regenerate-btn').addEventListener('click', () => {
            if (confirm('カードを新しく作り直しますか？')) initGame();
        });

        initGame();
    </script>
</body>
</html>
